<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact Us</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a class="brand" href="index.html">TOP DOWN TANK</a>

    <nav class="nav">
      <a href="guide.html">Guide</a>
      <a href="about.html">About Us</a>
      <a class="active" href="contact.html">Contact Us</a>
      <a href="privacy.html">Privacy Policy</a>
    </nav>

    <div class="auth">
      <a class="pill" href="signin.html">Sign in</a>
      <a class="pill" href="signup.html">Sign up</a>
    </div>
  </div>
</header>

<main class="main">
  <div class="page">
    <div class="page-title">Contact Us</div>

    <div class="card contact-card">
        <form class="form" id="contactForm">

            <div class="row">
                <label for="cName">User name</label>
                <input id="cName" type="text" placeholder="user name" />
            </div>

            <div class="row">
                <label for="cEmail">Email</label>
                <input id="cEmail" type="email" placeholder="email" />
            </div>

            <div class="row">
                <label for="cComment">Comment</label>
                <textarea id="cComment" placeholder="comment"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="smallbtn">Submit</button>
            </div>

        </form>
    </div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
