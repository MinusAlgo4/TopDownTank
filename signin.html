
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign in</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a class="brand" href="index.html">TOP DOWN TANK</a>

    <nav class="nav">
      <a href="guide.html">Guide</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="about.html">About Us</a>
      <a href="contact.html">Contact Us</a>
      <a href="privacy.html">Privacy Policy</a>
    </nav>

    <div class="auth">
      <a class="pill" href="signin.html">Sign in</a>
      <a class="pill" href="signup.html">Sign up</a>
    </div>
  </div>
</header>

<main class="main">
  <div class="page">
    <div class="page-title">Sign in Page</div>

    <div class="card contact-card auth-card">
      <form class="form" id="signinForm">

        <div class="row">
          <label for="siEmail">User name or email</label>
          <input id="siEmail" type="text" placeholder="User name or email" />
        </div>

        <div class="row">
          <label for="siPass">Password</label>
          <input id="siPass" type="password" placeholder="password" />
        </div>

        <div class="form-actions">
          <button class="primary" type="submit">Sign in</button>
          <div class="auth-link">
            don’t have account? <a href="signup.html">Sign up</a>
          </div>
        </div>

      </form>
    </div>
  </div>
</main>


<script src="app.js"></script>

</body>

</html>
